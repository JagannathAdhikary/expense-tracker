<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Expense Tracker</title>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <header>
    <div class="mnav">
      <button id="mprev">&#8249;</button>
      <span id="mlbl"></span>
      <button id="mnext">&#8250;</button>
    </div>
    <h1>Expenses</h1>
    <button class="menu-btn" id="menuBtn">⋮</button>
  </header>
  <div class="summary">
    <div class="card"><div class="lbl">Total spent</div><div class="val" id="tot">₹0</div></div>
    <div class="card"><div class="lbl">Transactions</div><div class="val" id="cnt">0</div></div>
  </div>
  <div id="cat-section" style="display:none">
    <p class="section-title">By category <span style="text-transform:none;color:#bbb;font-weight:400">(tap to filter)</span></p>
    <div class="cat-bars" id="cbars"></div>
  </div>
  <p class="section-title">Recent</p>
  <div id="tlist"></div>
  <div class="fab"><button id="addbtn">+</button></div>
</div>

<!-- CATEGORY VIEW -->
<div id="catview" class="screen">
  <header>
    <button class="back-btn" id="catbackbtn">&#8592; Back</button>
    <h1 id="catview-title">Category</h1>
    <span style="width:40px"></span>
  </header>
  <div class="summary">
    <div class="card"><div class="lbl">Total spent</div><div class="val" id="cvtot">₹0</div></div>
    <div class="card"><div class="lbl">Transactions</div><div class="val" id="cvcnt">0</div></div>
  </div>
  <p class="section-title" id="cvperiod"></p>
  <div id="cvlist"></div>
</div>

<!-- ADD / EDIT -->
<div id="add" class="screen">
  <header>
    <button class="back-btn" id="backbtn">&#8592; Back</button>
    <h1 id="form-title">Add expense</h1>
    <span style="width:40px"></span>
  </header>
  <div class="form">
    <div class="field">
      <label>Amount (₹)</label>
      <div class="amt-wrap">
        <span class="amt-prefix">₹</span>
        <input type="number" id="iamt" placeholder="0" inputmode="decimal"/>
      </div>
    </div>
    <div class="field">
      <label>Category</label>
      <div class="chips" id="ichips"></div>
    </div>
    <div class="field">
      <label>Payment type</label>
      <div class="pay-chips" id="ipaychips"></div>
    </div>
    <div class="field">
      <label>Note <span style="font-size:11px;opacity:.5">(optional)</span></label>
      <input type="text" id="idesc" placeholder="e.g. Swiggy, rent, SIP..."/>
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="idate"/>
    </div>
    <button class="save-btn" id="savebtn">Save</button>
  </div>
</div>

<!-- OPTIONS SHEET -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <h3>Options</h3>
    <button class="sheet-btn" id="manageCatsBtn"><span>🏷️</span> Manage categories</button>
    <button class="sheet-btn" id="managePaysBtn"><span>💳</span> Manage payment methods</button>
    <button class="sheet-btn" id="defaultsBtn"><span>⭐</span> Set defaults</button>
    <button class="sheet-btn" id="exportBtn"><span>📤</span> Export data (backup)</button>
    <button class="sheet-btn" id="importBtn"><span>📥</span> Import data (restore)</button>
    <input type="file" id="importFile" accept=".json" style="display:none"/>
    <button class="sheet-btn" id="closeSheet"><span>✕</span> Close</button>
  </div>
</div>

<!-- MANAGE CATEGORIES SHEET -->
<div class="overlay" id="catOverlay">
  <div class="sheet">
    <h3>Manage categories</h3>
    <div class="cat-manage-list" id="catManageList"></div>
    <button class="sheet-btn" id="addCatBtn" style="color:#1E3A5F;font-weight:500"><span>➕</span> Add new category</button>
    <button class="sheet-btn" id="closeCatSheet"><span>✕</span> Close</button>
  </div>
</div>

<!-- ADD CATEGORY MODAL -->
<div class="modal" id="catModal">
  <div class="modal-box">
    <h3>New category</h3>
    <div class="field">
      <label>Name</label>
      <input type="text" id="cName" placeholder="e.g. Education" maxlength="24"/>
    </div>
    <div class="field">
      <label>Emoji</label>
      <input type="text" id="cEmoji" placeholder="📚" maxlength="4" style="font-size:20px"/>
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-swatches" id="cSwatches"></div>
    </div>
    <div class="modal-actions">
      <button id="cCancel">Cancel</button>
      <button class="primary" id="cSave">Save</button>
    </div>
  </div>
</div>

<!-- MANAGE PAYMENT METHODS SHEET -->
<div class="overlay" id="payOverlay">
  <div class="sheet">
    <h3>Manage payment methods</h3>
    <div class="cat-manage-list" id="payManageList"></div>
    <button class="sheet-btn" id="addPayBtn" style="color:#1E3A5F;font-weight:500"><span>➕</span> Add new payment method</button>
    <button class="sheet-btn" id="closePaySheet"><span>✕</span> Close</button>
  </div>
</div>

<!-- ADD PAYMENT MODAL -->
<div class="modal" id="payModal">
  <div class="modal-box">
    <h3>New payment method</h3>
    <div class="field">
      <label>Name</label>
      <input type="text" id="pName" placeholder="e.g. Debit Card" maxlength="20"/>
    </div>
    <div class="field">
      <label>Emoji <span style="font-size:11px;opacity:.5">(optional)</span></label>
      <input type="text" id="pEmoji" placeholder="🏦" maxlength="4" style="font-size:20px"/>
    </div>
    <div class="modal-actions">
      <button id="pCancel">Cancel</button>
      <button class="primary" id="pSave">Save</button>
    </div>
  </div>
</div>

<!-- DEFAULTS MODAL -->
<div class="modal" id="defModal">
  <div class="modal-box">
    <h3>Set defaults</h3>
    <div class="field">
      <label>Default category</label>
      <div class="chips" id="defCatChips"></div>
    </div>
    <div class="field">
      <label>Default payment method</label>
      <div class="pay-chips" id="defPayChips"></div>
    </div>
    <div class="modal-actions">
      <button id="defCancel">Cancel</button>
      <button class="primary" id="defSave">Save</button>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
