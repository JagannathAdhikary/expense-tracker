<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1E3A5F"/>
<link rel="manifest" href="manifest.json"/>
<title>Expense Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#1a1a2e;min-height:100vh}
.screen{display:none;padding:1rem;max-width:480px;margin:0 auto;padding-bottom:6rem}
.screen.active{display:block}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
header h1{font-size:18px;font-weight:600}
.mnav{display:flex;align-items:center;gap:6px}
.mnav button{background:#fff;border:1px solid #ddd;border-radius:8px;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mnav span{font-size:13px;color:#666;min-width:76px;text-align:center}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.2rem}
.card{background:#fff;border-radius:14px;padding:.9rem 1rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card .lbl{font-size:12px;color:#888;margin-bottom:4px}
.card .val{font-size:22px;font-weight:600;color:#1E3A5F}
.section-title{font-size:12px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:.6rem}
.cat-bars{display:flex;flex-direction:column;gap:10px;margin-bottom:1.3rem}
.cat-row{display:flex;align-items:center;gap:10px}
.cat-row .cname{width:88px;font-size:13px;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-wrap{flex:1;background:#eee;border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.cat-row .camt{width:70px;text-align:right;font-size:13px;font-weight:500}

/* Date group */
.date-group{margin-bottom:10px}
.date-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#fff;border-radius:12px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06);user-select:none}
.date-header-left{display:flex;align-items:center;gap:8px}
.date-label{font-size:13px;font-weight:600;color:#1E3A5F}
.date-total{font-size:12px;color:#888}
.date-count{font-size:11px;background:#f0f4fa;color:#1E3A5F;border-radius:10px;padding:2px 7px;font-weight:600}
.chevron{font-size:13px;color:#aaa;transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.date-entries{display:flex;flex-direction:column;gap:8px;margin-top:8px;overflow:hidden;transition:all .2s}
.date-entries.collapsed{display:none}

.txn{background:#fff;border-radius:14px;padding:.8rem 1rem;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.txn-ico{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.txn-info{flex:1;min-width:0}
.txn-desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-meta{font-size:12px;color:#888;margin-top:2px}
.txn-amt{font-size:15px;font-weight:600;white-space:nowrap}
.txn-actions{display:flex;flex-direction:column;gap:2px}
.icon-btn{background:none;border:none;font-size:16px;color:#ccc;cursor:pointer;padding:3px;line-height:1}
.icon-btn:hover{color:#888}
.icon-btn.del:hover{color:#e74c3c}
.pay-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;margin-left:4px;vertical-align:middle}
.pay-UPI{background:#e8f4fd;color:#1a6fa8}
.pay-Cash{background:#e9f7ef;color:#1a6b3a}
.pay-Credit{background:#fdf0e8;color:#a04000}
.pay-Gift{background:#f5eafd;color:#6c3483}
.empty{text-align:center;padding:3rem 0;color:#bbb;font-size:15px}
.empty span{font-size:44px;display:block;margin-bottom:.6rem}
.fab{position:fixed;bottom:1.5rem;right:1.5rem;z-index:10}
.fab button{width:58px;height:58px;border-radius:50%;background:#1E3A5F;color:#fff;border:none;font-size:30px;cursor:pointer;box-shadow:0 4px 16px rgba(30,58,95,.35);display:flex;align-items:center;justify-content:center}
.menu-btn{background:none;border:none;font-size:22px;cursor:pointer;color:#888;padding:4px}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:15px;color:#666;cursor:pointer;padding:4px 0}
.form{display:flex;flex-direction:column;gap:16px;margin-top:.5rem}
.field label{font-size:13px;color:#666;margin-bottom:6px;display:block;font-weight:500}
.field input{width:100%;padding:12px 14px;font-size:16px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;outline:none;color:#1a1a2e}
.field input:focus{border-color:#1E3A5F}
.amt-wrap{position:relative}
.amt-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:#888;font-weight:500}
#iamt{padding-left:34px;font-size:22px;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 14px;border-radius:20px;font-size:13px;border:1.5px solid #e0e0e0;cursor:pointer;background:#fff;color:#555;user-select:none}
.chip.on{background:#1E3A5F;color:#fff;border-color:#1E3A5F}
.pay-chips{display:flex;gap:8px;flex-wrap:wrap}
.pay-chip{padding:8px 14px;border-radius:20px;font-size:13px;border:1.5px solid #e0e0e0;cursor:pointer;background:#fff;color:#555;user-select:none;display:flex;align-items:center;gap:5px}
.pay-chip.on{border-width:2px}
.pay-chip[data-pay="UPI"].on{background:#e8f4fd;color:#1a6fa8;border-color:#1a6fa8}
.pay-chip[data-pay="Cash"].on{background:#e9f7ef;color:#1a6b3a;border-color:#1a6b3a}
.pay-chip[data-pay="Credit"].on{background:#fdf0e8;color:#a04000;border-color:#a04000}
.pay-chip[data-pay="Gift"].on{background:#f5eafd;color:#6c3483;border-color:#6c3483}
.save-btn{width:100%;padding:15px;background:#1E3A5F;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:20;align-items:flex-end}
.overlay.open{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:480px;margin:0 auto}
.sheet h3{font-size:16px;font-weight:600;margin-bottom:1rem;color:#1a1a2e}
.sheet-btn{display:flex;align-items:center;gap:12px;width:100%;padding:13px 0;border:none;background:none;font-size:15px;color:#1a1a2e;cursor:pointer;border-bottom:1px solid #f0f0f0}
.sheet-btn:last-child{border-bottom:none;color:#e74c3c}
.sheet-btn span{font-size:22px}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <header>
    <div class="mnav">
      <button id="mprev">&#8249;</button>
      <span id="mlbl"></span>
      <button id="mnext">&#8250;</button>
    </div>
    <h1>Expenses</h1>
    <button class="menu-btn" id="menuBtn">⋮</button>
  </header>
  <div class="summary">
    <div class="card"><div class="lbl">Total spent</div><div class="val" id="tot">₹0</div></div>
    <div class="card"><div class="lbl">Transactions</div><div class="val" id="cnt">0</div></div>
  </div>
  <div id="cat-section" style="display:none">
    <p class="section-title">By category</p>
    <div class="cat-bars" id="cbars"></div>
  </div>
  <p class="section-title">Recent</p>
  <div id="tlist"></div>
  <div class="fab"><button id="addbtn">+</button></div>
</div>

<!-- ADD / EDIT -->
<div id="add" class="screen">
  <header>
    <button class="back-btn" id="backbtn">&#8592; Back</button>
    <h1 id="form-title">Add expense</h1>
  </header>
  <div class="form">
    <div class="field">
      <label>Amount (₹)</label>
      <div class="amt-wrap">
        <span class="amt-prefix">₹</span>
        <input type="number" id="iamt" placeholder="0" inputmode="decimal"/>
      </div>
    </div>
    <div class="field">
      <label>Category</label>
      <div class="chips" id="ichips"></div>
    </div>
    <div class="field">
      <label>Payment type</label>
      <div class="pay-chips" id="ipaychips">
        <div class="pay-chip" data-pay="UPI">📲 UPI</div>
        <div class="pay-chip" data-pay="Cash">💵 Cash</div>
        <div class="pay-chip" data-pay="Credit">💳 Credit Card</div>
        <div class="pay-chip" data-pay="Gift">🎁 Gift Card</div>
      </div>
    </div>
    <div class="field">
      <label>Note <span style="font-size:11px;opacity:.5">(optional)</span></label>
      <input type="text" id="idesc" placeholder="e.g. Swiggy, rent, SIP..."/>
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="idate"/>
    </div>
    <button class="save-btn" id="savebtn">Save</button>
  </div>
</div>

<!-- OPTIONS SHEET -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <h3>Options</h3>
    <button class="sheet-btn" id="exportBtn"><span>📤</span> Export data (backup)</button>
    <button class="sheet-btn" id="importBtn"><span>📥</span> Import data (restore)</button>
    <input type="file" id="importFile" accept=".json" style="display:none"/>
    <button class="sheet-btn" id="closeSheet"><span>✕</span> Close</button>
  </div>
</div>

<script>
const CATS=[
  {n:"Living",e:"🏠",c:"#1E3A5F"},
  {n:"Investments",e:"📈",c:"#1A6B3A"},
  {n:"Lifestyle",e:"✨",c:"#7D3C98"},
  {n:"Food",e:"🍽️",c:"#C0392B"},
  {n:"Transport",e:"🚗",c:"#D35400"},
  {n:"Health",e:"💊",c:"#0E6655"},
  {n:"Other",e:"📦",c:"#808B96"},
];
const MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

let recs=[];
try{recs=JSON.parse(localStorage.getItem("xpns")||"[]");}catch(e){}
let selCat=CATS[0].n;
let selPay="UPI";
let editId=null;
let cur=new Date();cur.setDate(1);

// track which date groups are collapsed; default all expanded
const collapsed=new Set();

const fmt=n=>"₹"+Math.round(n).toLocaleString("en-IN");
const persist=()=>{try{localStorage.setItem("xpns",JSON.stringify(recs));}catch(e){}};
const isoDay=d=>d.toISOString().split("T")[0];

function filtered(){
  return recs.filter(r=>{
    const d=new Date(r.date);
    return d.getMonth()===cur.getMonth()&&d.getFullYear()===cur.getFullYear();
  });
}

function friendlyDate(dateStr){
  const d=new Date(dateStr);
  const today=isoDay(new Date());
  const yesterday=isoDay(new Date(Date.now()-86400000));
  if(dateStr===today) return "Today";
  if(dateStr===yesterday) return "Yesterday";
  return DAYS[d.getDay()]+", "+d.getDate()+" "+MN[d.getMonth()];
}

function payBadge(pay){
  if(!pay)return'';
  return`<span class="pay-badge pay-${pay==="Credit"?"Credit":pay==="Gift"?"Gift":pay}">${pay}</span>`;
}

function render(){
  document.getElementById("mlbl").textContent=MN[cur.getMonth()]+" "+cur.getFullYear();
  const rows=filtered().sort((a,b)=>new Date(b.date)-new Date(a.date)||(b.id-a.id));
  const total=rows.reduce((s,r)=>s+r.amt,0);
  document.getElementById("tot").textContent=fmt(total);
  document.getElementById("cnt").textContent=rows.length;

  // category bars
  const byc={};rows.forEach(r=>{byc[r.cat]=(byc[r.cat]||0)+r.amt;});
  const catSec=document.getElementById("cat-section");
  catSec.style.display=Object.keys(byc).length?"block":"none";
  const mx=Math.max(...Object.values(byc),1);
  const cbars=document.getElementById("cbars");cbars.innerHTML="";
  CATS.forEach(c=>{
    if(!byc[c.n])return;
    const pct=Math.round(byc[c.n]/mx*100);
    const d=document.createElement("div");d.className="cat-row";
    d.innerHTML=`<div class="cname">${c.e} ${c.n}</div><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${c.c}"></div></div><div class="camt">${fmt(byc[c.n])}</div>`;
    cbars.appendChild(d);
  });

  const tlist=document.getElementById("tlist");
  if(!rows.length){
    tlist.innerHTML='<div class="empty"><span>🧾</span>No expenses this month.<br>Tap + to add one.</div>';
    return;
  }

  // group by date (already sorted latest first)
  const groups=[];
  const seen={};
  rows.forEach(r=>{
    if(!seen[r.date]){seen[r.date]=[];groups.push({date:r.date,items:seen[r.date]});}
    seen[r.date].push(r);
  });

  tlist.innerHTML="";
  groups.forEach(g=>{
    const isCollapsed=collapsed.has(g.date);
    const groupTotal=g.items.reduce((s,r)=>s+r.amt,0);
    const grp=document.createElement("div");
    grp.className="date-group";
    grp.dataset.date=g.date;

    const entriesHtml=g.items.map(r=>{
      const cat=CATS.find(c=>c.n===r.cat)||CATS[CATS.length-1];
      return`<div class="txn">
        <div class="txn-ico" style="background:${cat.c}20">${cat.e}</div>
        <div class="txn-info">
          <div class="txn-desc">${r.desc||cat.n}</div>
          <div class="txn-meta">${cat.n}${payBadge(r.pay||'UPI')}</div>
        </div>
        <div class="txn-amt">${fmt(r.amt)}</div>
        <div class="txn-actions">
          <button class="icon-btn edit" data-id="${r.id}">✏️</button>
          <button class="icon-btn del" data-id="${r.id}">×</button>
        </div>
      </div>`;
    }).join("");

    grp.innerHTML=`
      <div class="date-header">
        <div class="date-header-left">
          <span class="chevron${isCollapsed?'':' open'}">▼</span>
          <span class="date-label">${friendlyDate(g.date)}</span>
          <span class="date-count">${g.items.length}</span>
        </div>
        <span class="date-total">${fmt(groupTotal)}</span>
      </div>
      <div class="date-entries${isCollapsed?' collapsed':''}">${entriesHtml}</div>`;
    tlist.appendChild(grp);
  });
}

// toggle collapse on date header click
document.getElementById("tlist").addEventListener("click",e=>{
  // delete
  const del=e.target.closest(".del");
  if(del){if(!confirm("Delete this entry?"))return;recs=recs.filter(r=>r.id!=del.dataset.id);persist();render();return;}
  // edit
  const edit=e.target.closest(".edit");
  if(edit){showEdit(Number(edit.dataset.id));return;}
  // collapse toggle
  const hdr=e.target.closest(".date-header");
  if(hdr){
    const grp=hdr.closest(".date-group");
    const date=grp.dataset.date;
    const entries=grp.querySelector(".date-entries");
    const chevron=grp.querySelector(".chevron");
    if(collapsed.has(date)){collapsed.delete(date);entries.classList.remove("collapsed");chevron.classList.add("open");}
    else{collapsed.add(date);entries.classList.add("collapsed");chevron.classList.remove("open");}
  }
});

function setPayChip(pay){
  selPay=pay;
  document.querySelectorAll(".pay-chip").forEach(c=>c.classList.toggle("on",c.dataset.pay===pay));
}

function showAdd(){
  editId=null;selCat=CATS[0].n;selPay="UPI";
  document.getElementById("form-title").textContent="Add expense";
  document.getElementById("ichips").innerHTML=CATS.map(c=>`<div class="chip${c.n===selCat?" on":""}" data-cat="${c.n}">${c.e} ${c.n}</div>`).join("");
  setPayChip("UPI");
  document.getElementById("iamt").value="";
  document.getElementById("idesc").value="";
  document.getElementById("idate").value=isoDay(new Date());
  document.getElementById("home").classList.remove("active");
  document.getElementById("add").classList.add("active");
  setTimeout(()=>document.getElementById("iamt").focus(),100);
}

function showEdit(id){
  const r=recs.find(x=>x.id===id);if(!r)return;
  editId=id;selCat=r.cat;selPay=r.pay||"UPI";
  document.getElementById("form-title").textContent="Edit expense";
  document.getElementById("ichips").innerHTML=CATS.map(c=>`<div class="chip${c.n===selCat?" on":""}" data-cat="${c.n}">${c.e} ${c.n}</div>`).join("");
  setPayChip(selPay);
  document.getElementById("iamt").value=r.amt;
  document.getElementById("idesc").value=r.desc||"";
  document.getElementById("idate").value=r.date;
  document.getElementById("home").classList.remove("active");
  document.getElementById("add").classList.add("active");
  setTimeout(()=>document.getElementById("iamt").focus(),100);
}

function showHome(){document.getElementById("add").classList.remove("active");document.getElementById("home").classList.add("active");render();}

document.getElementById("addbtn").onclick=showAdd;
document.getElementById("backbtn").onclick=showHome;
document.getElementById("mprev").onclick=()=>{cur=new Date(cur.getFullYear(),cur.getMonth()-1,1);render();};
document.getElementById("mnext").onclick=()=>{cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);render();};
document.getElementById("menuBtn").onclick=()=>document.getElementById("overlay").classList.add("open");
document.getElementById("closeSheet").onclick=()=>document.getElementById("overlay").classList.remove("open");
document.getElementById("overlay").onclick=e=>{if(e.target===document.getElementById("overlay"))document.getElementById("overlay").classList.remove("open");};

document.getElementById("ichips").addEventListener("click",e=>{
  const chip=e.target.closest(".chip");if(!chip)return;
  selCat=chip.dataset.cat;
  document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",c===chip));
});
document.getElementById("ipaychips").addEventListener("click",e=>{
  const chip=e.target.closest(".pay-chip");if(!chip)return;
  setPayChip(chip.dataset.pay);
});

document.getElementById("savebtn").onclick=function(){
  const amt=parseFloat(document.getElementById("iamt").value);
  if(!amt||amt<=0){document.getElementById("iamt").focus();return;}
  const desc=document.getElementById("idesc").value.trim();
  const date=document.getElementById("idate").value||isoDay(new Date());
  if(editId){
    const idx=recs.findIndex(r=>r.id===editId);
    if(idx>-1)recs[idx]={...recs[idx],amt,cat:selCat,pay:selPay,desc,date};
  } else {
    recs.push({id:Date.now(),amt,cat:selCat,pay:selPay,desc,date});
  }
  persist();showHome();
};

document.getElementById("exportBtn").onclick=function(){
  const blob=new Blob([JSON.stringify(recs,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="expenses_backup_"+isoDay(new Date())+".json";a.click();
  document.getElementById("overlay").classList.remove("open");
};
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=function(){
  const file=this.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const imported=JSON.parse(e.target.result);
      if(!Array.isArray(imported))throw new Error();
      if(confirm(`Import ${imported.length} records? This will merge with existing data.`)){
        const existingIds=new Set(recs.map(r=>r.id));
        imported.forEach(r=>{if(!existingIds.has(r.id))recs.push(r);});
        persist();render();
        document.getElementById("overlay").classList.remove("open");
        alert("Import successful!");
      }
    }catch(err){alert("Invalid backup file.");}
  };
  reader.readAsText(file);this.value="";
};

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
render();
</script>
</body>
</html>
